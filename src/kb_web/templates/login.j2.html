{% extends "base.j2.html" %}

{% block title %}KB Gateway Verification{% endblock %}

{% block content %}
<div class="flex items-center justify-center mt-12 mx-4">
    <div class="w-full max-w-md p-8 bg-white border border-gray-200 rounded-lg shadow-sm">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">🔐 Core Knowledge Base</h1>
        <p class="text-sm text-gray-500 mb-6">Enter server verification token code to interact with ingestion routes.</p>

        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 text-sm mb-4 rounded-r">{{ error }}</div>
        {% endif %}

        <form action="/login" method="post" class="space-y-4">
            <input type="hidden" name="next" value="{{ next or '' }}">
            <div>
                <label for="password" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Passphrase</label>
                <input type="password" id="password" name="password" required autofocus
                       class="w-full px-3 py-2 bg-white border border-gray-300 text-gray-900 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded transition shadow-sm">
                Authenticate Session
            </button>
        </form>
    </div>
</div>
{% endblock %}
