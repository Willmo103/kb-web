<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Knowledge Base Engine{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}

    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen antialiased flex flex-col">

    <div class="w-full px-4 pt-4">
        <div class="mb-6 flex justify-between items-center bg-white p-4 rounded-lg border border-gray-200 shadow-sm max-w-4xl mx-auto">
            <div class="flex gap-4 font-semibold text-sm">
                <a href="/" class="text-indigo-600 hover:text-indigo-800 flex items-center">
                    <span class="mr-1">🏠</span> Home
                </a>
                <a href="/sites" class="text-indigo-600 hover:text-indigo-800 flex items-center">
                    <span class="mr-1">🌐</span> Sites
                </a>
                <a href="/?view=videos" class="text-indigo-600 hover:text-indigo-800 flex items-center">
                    <span class="mr-1">📺</span> Videos
                </a>
            </div>
            {% if is_admin %}
            <div class="flex gap-3 items-center">
                <a href="/import" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 border border-indigo-200 py-1 px-2 rounded bg-indigo-50 transition">
                    + Ingest URL
                </a>
                <a href="/admin" class="text-xs font-semibold text-gray-600 hover:text-gray-800 border border-gray-200 py-1 px-2 rounded transition">
                    Admin Dashboard
                </a>
                <a href="/logout" class="text-xs font-semibold text-red-500 hover:text-red-850 border border-red-250 py-1 px-2 rounded bg-red-50 transition">
                    Logout
                </a>
            </div>
            {% else %}
            <a href="/login" class="text-xs font-semibold text-gray-500 hover:text-gray-800 border border-gray-200 py-1 px-2 rounded transition">
                🔑 Admin Login
            </a>
            {% endif %}
        </div>
    </div>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
