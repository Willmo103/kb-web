{% extends "base.j2.html" %}

{% block title %}Server Logs{% endblock %}

{% block content %}
<div class="container mx-auto px-4 max-w-5xl pb-12">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-900">📄 Server Application Logs</h1>
            <p class="text-sm text-gray-500 font-medium">Trace output of warning, error, scheduler events, and requests.</p>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
            <div class="flex items-center gap-1.5 bg-white border border-gray-300 rounded-lg px-2.5 py-1.5 shadow-sm text-xs">
                <label for="logLimit" class="font-bold text-gray-700">Lines:</label>
                <select id="logLimit" class="bg-transparent font-semibold text-indigo-700 outline-none cursor-pointer" onchange="changeLimit(this.value)">
                    <option value="100" {% if limit == 100 %}selected{% endif %}>100</option>
                    <option value="500" {% if limit == 500 %}selected{% endif %}>500</option>
                    <option value="1000" {% if limit == 1000 %}selected{% endif %}>1,000</option>
                    <option value="2000" {% if limit == 2000 %}selected{% endif %}>2,000</option>
                    <option value="5000" {% if limit == 5000 %}selected{% endif %}>5,000</option>
                    <option value="10000" {% if limit == 10000 %}selected{% endif %}>10,000</option>
                </select>
            </div>
            <a href="/admin/logs/download?limit={{ limit }}" class="bg-gray-100 hover:bg-gray-200 border border-gray-300 text-gray-800 text-xs font-bold py-2 px-4 rounded-lg shadow-sm transition flex items-center gap-1">
                📥 Download
            </a>
            <button onclick="window.location.reload()" class="bg-indigo-650 hover:bg-indigo-705 text-white text-xs font-bold py-2 px-4 rounded-lg shadow-sm transition">
                🔄 Refresh
            </button>
        </div>
    </div>

    <div class="bg-gray-900 text-green-400 p-6 rounded-xl font-mono text-xs overflow-x-auto shadow-2xl border border-gray-800 leading-relaxed max-h-192 overflow-y-auto">
        <pre class="whitespace-pre-wrap">{{ log_content }}</pre>
    </div>
</div>

<script>
    function changeLimit(val) {
        window.location.href = '/admin/logs?limit=' + val;
    }
</script>
{% endblock %}
